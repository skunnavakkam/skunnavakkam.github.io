<!DOCTYPE html>
<style>
	* {
		padding: 0px;
	}

	.title {
		font-family: serif;
		font-size: xx-large;
		font-weight: 400;
		margin-bottom: 0px;
	}

	body {
		max-width: 512px;
		margin-left: auto;
		margin-right: auto;
		margin-top: 5em;
		padding: 0px;
	}

	p {
		line-height: 1.8;
	}

	pre {
		padding: 15px;
		border-radius: 5px;
	}

	h1 {
		font-size: x-large;
		font-weight: 400;
	}

	h2 {
		font-size: large;
		font-weight: 400;
	}

	.toc-header {
		margin: 0px;
		line-height: 0px;
	}

	.toc {
		padding-left: 10px;
		margin: 0px;
		border-left-style: solid;
	}

	.toc li {
		list-style-type: none;
	}

	.toc a {
		color: black; /* Default link color */
		text-decoration: none; /* No underline */
	}

	.toc a:hover {
		color: green; /* Green color on hover for links */
	}

	.toc .h1 {
		font-weight: 400; /* Bold for H1 items */
		margin-bottom: 5px; /* Space between H1 items */
		text-decoration: underline;
	}

	.toc .h2 {
		font-weight: 400; /* Regular weight for H2 items */
		padding-left: 30px; /* Indent H2 items to show hierarchy */
		margin-bottom: 5px; /* Space between H2 items */
	}

	.full-toc * {
		margin: 0px;
	}

	.full-toc {
		margin-bottom: 1.5em;
	}
</style>

<html lang="en">
	<head>
		<title>Media I Like</title>
		<link
			rel="stylesheet"
			href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css"
			integrity="sha384-n8MVd4RsNIU0tAv4ct0nTaAbDJwPJzDEaqSD1odI+WdtXRGWt2kTvGFasHpSy3SV"
			crossorigin="anonymous"
		/>

		<!-- The loading of KaTeX is deferred to speed up page rendering -->
		<script
			defer
			src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"
			integrity="sha384-XjKyOOlGwcjNTAIQHIpgOno0Hl1YQqzUOEleOLALmuqehneUG+vnGctmUb0ZY0l8"
			crossorigin="anonymous"
		></script>

		<!-- To automatically render math in text elements, include the auto-render extension: -->
		<script 
			defer
			src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"
			integrity="sha384-+VBxd3r6XgURycqtZ117nYw44OOcIax56Z4dCRWbxyPt0Koah1uHoK0o4+/RRE05"
			crossorigin="anonymous"
			onload="renderMathInElement(document.body);"
		></script>
	</head>
	<body>
		<h1 class="title">Media I Like</h1>
		<p style="margin-top: 5px">
			Published 
		</p>
		
		<div class="full-toc">
			<h2 style="margin-bottom: 5px; font-weight: 500">Table of Contents</h2>
			<div class="toc">
				<ul>
					
					<li>
						<a class="h1" href="https://skunnavakkam.github.io/blog/mediailike/#books">Books</a>
						
					</li>
					
					<li>
						<a class="h1" href="https://skunnavakkam.github.io/blog/mediailike/#film">Film</a>
						
					</li>
					
					<li>
						<a class="h1" href="https://skunnavakkam.github.io/blog/mediailike/#music">Music</a>
						
					</li>
					
					<li>
						<a class="h1" href="https://skunnavakkam.github.io/blog/mediailike/#other">Other</a>
						
					</li>
					
				</ul>
			</div>
		</div>
		 <h1 id="books">Books</h1>
<h1 id="film">Film</h1>
<h1 id="music">Music</h1>
<h1 id="other">Other</h1>

</html>
