<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ section.title }} | Sudarsh Kunnavakkam</title>
    <meta name="description" content="{{ config.description }}">
    <meta name="author" content="{{ config.extra.author }}">
    <meta name="keywords" content="{{ config.extra.keywords }}">

    <!-- Open Graph -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="{{ section.title }} | Sudarsh Kunnavakkam">
    <meta property="og:description" content="{{ config.description }}">
    <meta name="twitter:card" content="summary">

    <link rel="canonical" href="{{ current_url | safe }}">

    <script>
        (function () {
            try {
                if (localStorage.getItem('night-mode') === 'true') {
                    document.documentElement.classList.add('night');
                }
            } catch (e) { }
        })();
    </script>

    <script data-goatcounter="https://skunnavakkam.goatcounter.com/count" async src="//gc.zgo.at/count.js"></script>
    <link rel="stylesheet" href="/common.css">

    <style>
        body {
            padding: 30px;
        }

        .content-wrapper {
            max-width: max(60%, 600px);
        }

        .title {
            font-style: italic;
            letter-spacing: -0.01em;
            margin-bottom: 4px;
        }

        .top-bar {
            display: flex;
            align-items: baseline;
            gap: 16px;
            margin-bottom: 24px;
            flex-wrap: wrap;
        }

        .top-bar .nav-links {
            margin: 0;
            width: auto;
            flex-shrink: 0;
        }

        .subtitle {
            font-style: italic;
            color: var(--muted);
            margin: 0;
            font-size: 0.95em;
        }

        .nav-links a {
            color: var(--muted);
            font-style: italic;
            text-decoration: none;
            border-bottom: 1px dashed var(--muted);
        }

        .nav-links a:hover {
            color: var(--accent);
            border-bottom-color: var(--accent);
        }

        hr {
            border: none;
            border-top: 1px dashed var(--border-strong);
            margin: 20px 0;
        }

        ul { list-style: none; padding-left: 0; }
        li {
            padding: 10px 0;
            border-bottom: 1px dashed var(--border-strong);
        }
        li:last-child { border-bottom: none; }

        .wip-stamp {
            position: fixed;
            top: 36px;
            right: 40px;
            font-size: 11px;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            color: var(--accent);
            border: 1px dashed var(--accent);
            padding: 4px 10px;
            transform: rotate(4deg);
            pointer-events: none;
            opacity: 0.7;
        }

        @media (max-width: 600px) {
            body { padding: 22px 20px 30px; }
            .wip-stamp { top: 16px; right: 16px; font-size: 10px; padding: 3px 8px; }
        }
    </style>
</head>

<body>
    <span class="wip-stamp">work in progress</span>

    <div class="content-wrapper">
        <h1 class="title">{{ section.title }}</h1>

        <div class="top-bar">
            <div class="nav-links">
                <a href="/">
                    < back home</a>
            </div>
            <p class="subtitle">half-thoughts, unfinished notes, things i'm still figuring out</p>
        </div>

        {{ section.content | safe }}

        {% block content %}
        {% endblock content %}
    </div>
</body>

</html>
